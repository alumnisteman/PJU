</a>

<script>
        // ─── Data PJU Ternate (koordinat GPS nyata) ───────────────────────────
        const PJU_ASSETS = [
            { id:'PJU-TTE-001', lat:0.7883, lng:127.3782, status:'Active',  dimming:'80%', alamat:'Jl. Pahlawan Revolusi, Ternate' },
            { id:'PJU-TTE-015', lat:0.7825, lng:127.3742, status:'Active',  dimming:'75%', alamat:'Kawasan Pelabuhan Ahmad Yani' },
            { id:'PJU-TTE-023', lat:0.7965, lng:127.3860, status:'Active',  dimming:'90%', alamat:'Jl. Sultan Babullah, Ternate' },
            { id:'PJU-TTE-033', lat:0.8003, lng:127.3902, status:'Dimmed',  dimming:'35%', alamat:'Jl. Makassar, Ternate Utara' },
            { id:'PJU-TTE-042', lat:0.7912, lng:127.3821, status:'Dimmed',  dimming:'30%', alamat:'Jl. Ahmad Yani, Ternate' },
            { id:'PJU-TTE-056', lat:0.7852, lng:127.3770, status:'Active',  dimming:'85%', alamat:'Jl. Stadion, Ternate Selatan' },
            { id:'PJU-TTE-071', lat:0.7995, lng:127.3888, status:'Active',  dimming:'70%', alamat:'Jl. Tanah Tinggi, Ternate' },
            { id:'PJU-TTE-088', lat:0.7950, lng:127.3835, status:'Offline', dimming:'0%',  alamat:'Jl. Nukila, Ternate Tengah' },
            { id:'PJU-TTE-095', lat:0.7870, lng:127.3805, status:'Active',  dimming:'80%', alamat:'Jl. Salero, Ternate' },
            { id:'PJU-TTE-102', lat:0.7895, lng:127.3815, status:'Active',  dimming:'65%', alamat:'Taman Kota Ternate' },
            { id:'PJU-TTE-118', lat:0.7930, lng:127.3798, status:'Active',  dimming:'80%', alamat:'Jl. Sultan Khairun, Tanah Raja' },
            { id:'PJU-TTE-134', lat:0.7840, lng:127.3760, status:'Dimmed',  dimming:'40%', alamat:'Jl. Mangga Dua, Ternate Selatan' },
        ];

        // ─── Inisialisasi Leaflet Map ──────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            const map = L.map('leaflet-map', {
                center: [0.7897, 127.3842],
                zoom: 15,
                zoomControl: true,
                attributionControl: true
            });

            // OpenStreetMap tiles
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                maxZoom: 19
            }).addTo(map);

            // Custom icon factory
            function makeIcon(color) {
                return L.divIcon({
                    className: '',
                    html: `<div style="
                        width:26px;height:26px;border-radius:50% 50% 50% 0;
                        background:${color};border:3px solid #fff;
                        box-shadow:0 2px 8px rgba(0,0,0,0.4);
                        transform:rotate(-45deg);
                    "></div>`,
                    iconSize: [26, 26],
                    iconAnchor: [13, 26],
                    popupAnchor: [0, -28]
                });
            }

            const colorMap = { Active:'#10b981', Dimmed:'#f59e0b', Offline:'#ef4444' };

            PJU_ASSETS.forEach(asset => {
                const icon = makeIcon(colorMap[asset.status]);
                L.marker([asset.lat, asset.lng], { icon })
                    .addTo(map)
                    .bindTooltip(asset.id, { permanent: false, direction: 'top' })
                    .on('click', () => selectPole(asset.id, asset.status, asset.dimming, asset.alamat));
            });

            // Search - pan peta ke marker yang cocok
            document.querySelector('input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const q = this.value.toUpperCase();
                    const found = PJU_ASSETS.find(a => a.id.includes(q));
                    if (found) {
                        map.flyTo([found.lat, found.lng], 17);
                        selectPole(found.id, found.status, found.dimming, found.alamat);
                    }
                }
            });
        });

        // ─── Update panel detail bawah ────────────────────────────────────────
        function selectPole(id, status, dimming, alamat) {
            const card = document.getElementById('pole-detail-card');
            const idEl = document.getElementById('pole-id');
            const statusBadge = document.getElementById('pole-status-badge');
            const dimmingEl = document.getElementById('pole-dimming');
            const dimmingBar = document.getElementById('pole-dimming-bar');

            card.classList.add('translate-y-4', 'opacity-50');
            setTimeout(() => {
                idEl.innerText = id;
                dimmingEl.innerText = dimming;
                dimmingBar.style.width = dimming;
                statusBadge.innerText = status;
                statusBadge.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold ';
                if (status === 'Active') {
                    statusBadge.classList.add('bg-emerald-100', 'text-emerald-800');
                    dimmingBar.className = 'h-full transition-all duration-1000 bg-primary';
                } else if (status === 'Dimmed') {
                    statusBadge.classList.add('bg-amber-100', 'text-amber-800');
                    dimmingBar.className = 'h-full transition-all duration-1000 bg-amber-500';
                } else {
                    statusBadge.classList.add('bg-red-100', 'text-red-800');
                    dimmingBar.className = 'h-full transition-all duration-1000 bg-red-500';
                }
                // Update alamat jika ada elemen
                const alamatEl = document.querySelector('[data-field="alamat"]');
                if (alamatEl && alamat) alamatEl.innerText = alamat;
                card.classList.remove('translate-y-4', 'opacity-50');
            }, 150);
        }
    </script>
