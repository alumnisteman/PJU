user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Main index page
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Module directories
        location ~ ^/(absensi_kehadiran_teknisi|ai_predictive_maintenance|analitik_alert_pju|ar_asset_inspection|dashboard_eksekutif_smart_pju|dashboard_mobilitas_warga|dashboard_penugasan_teknisi|dashboard_pln_mobile|detail_lapor_lampu_padam|detail_penugasan_teknisi|detail_tiang_lampu|digital_twin_command_center|donasi_lampu_taman|esg_sustainability_dash|hub_integrasi_api|hub_pengisian_ev_pju|inspeksi_kendaraan_harian|integrasi_otentikasi_pln_mobile|jadwal_pemeliharaan_pju|jaringan_keamanan_publik|keamanan_privasi_database|konfigurasi_sistem_backend|kontrol_adaptif_cuaca|kontrol_suara_command_center|lapor_gangguan_pju|laporan_keuangan_audit|log_audit_keamanan|manajemen_bbm_armada|manajemen_enkripsi_api|notifikasi_informasi|pengaturan_rute_berbasis_stok|peta_keamanan_rute_terang|peta_monitoring_pju|peta_rute_pemeliharaan|pju_smart_dashboard|portal_transparansi_publik|power_engineering_precision|profil_pengguna|pusat_kendali_integrasi|pusat_pemulihan_bencana_dr|riwayat_transaksi|security_dashboard|setup_produksi_deploy|simulasi_beban_penuh_sistem|simulasi_darurat_pju|simulasi_kegagalan_server_dr|simulasi_penghematan_roi|simulasi_serangan_siber|skema_database_relasi|stok_material_kendaraan|verifikasi_penyelesaian_tugas)/ {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # API proxy to backend
        location /api/ {
            proxy_pass http://backend-api:3000/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_intercept_errors off;
        }
    }
}
