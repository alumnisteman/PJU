# Mosquitto Configuration for Smart PJU System

# Listener configuration
listener 1883
protocol mqtt

# WebSocket listener
listener 9001
protocol websockets

# Security - Allow anonymous for now (will enable auth later)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/
autosave_interval 1800

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
connection_messages true
log_timestamp true

# Max connections
max_connections -1
max_queued_messages 10000
