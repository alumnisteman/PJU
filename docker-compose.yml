version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: pju-postgres
    environment:
      POSTGRES_DB: pju_smart
      POSTGRES_USER: pju_admin
      POSTGRES_PASSWORD: pju_secure_2024
      TZ: Asia/Jakarta
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - pju-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pju_admin -d pju_smart"]
      interval: 10s
      timeout: 5s
      retries: 5

  # TimescaleDB for Time-series Data
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: pju-timescaledb
    environment:
      POSTGRES_DB: pju_timeseries
      POSTGRES_USER: pju_admin
      POSTGRES_PASSWORD: pju_secure_2024
      TZ: Asia/Jakarta
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./database/timescale-init.sql:/docker-entrypoint-initdb.d/timescale-init.sql
    restart: unless-stopped
    networks:
      - pju-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pju_admin -d pju_timeseries"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Caching & Real-time Status
  redis:
    image: redis:7-alpine
    container_name: pju-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - pju-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # MQTT Broker for IoT Communication
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: pju-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    restart: unless-stopped
    networks:
      - pju-network
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "localhost", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API (Node.js/Express)
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pju-backend-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pju_smart
      DB_USER: pju_admin
      DB_PASSWORD: pju_secure_2024
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      TIMESCALE_NAME: pju_timeseries
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      TZ: Asia/Jakarta
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pju-network
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Web Server untuk Smart PJU System
  pju-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pju-smart-web
    ports:
      - "8080:80"
      - "8443:443"
    restart: unless-stopped
    networks:
      - pju-network
    volumes:
      - /var/www/pju-smart/logs:/var/log/nginx
    environment:
      - TZ=Asia/Jakarta
      - NGINX_HOST=192.168.1.14
      - NGINX_PORT=80
      - API_URL=http://backend-api:3000
    depends_on:
      - backend-api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.pju.description=Smart PJU Digital Twin Web Server"
      - "com.pju.version=1.0.0"

networks:
  pju-network:
    driver: bridge
    name: pju-smart-network

volumes:
  postgres_data:
    driver: local
  timescale_data:
    driver: local
  redis_data:
    driver: local
  mosquitto_data:
    driver: local
  mosquitto_logs:
    driver: local
  pju-logs:
    driver: local
