<style>
        @keyframes pulse-ring {
            0% { transform: scale(.33); opacity: 0.8; }
            80%, 100% { transform: scale(1); opacity: 0; }
        }
        @keyframes pulse-orb {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 74, 198, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(0, 74, 198, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 74, 198, 0); }
        }
        .voice-orb-ring {
            animation: pulse-ring 2.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        .voice-orb-core {
            animation: pulse-orb 2s infinite;
        }
        .wave-bar {
            transition: height 0.1s ease-in-out;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
    </style>

<script>
        // Micro-interactions for the wave visualization
        const waveBars = document.querySelectorAll('.wave-bar');
        
        function animateWave() {
            waveBars.forEach(bar => {
                const randomHeight = Math.floor(Math.random() * 80) + 20;
                bar.style.height = `${randomHeight}%`;
            });
        }

        setInterval(animateWave, 150);

        // Simple state toggle simulation
        let isProcessing = false;
        const micCore = document.querySelector('.voice-orb-core');
        const statusText = document.querySelector('.font-label-caps');
        const currentText = document.getElementById('current-transcription');

        micCore.addEventListener('click', () => {
            isProcessing = !isProcessing;
            if (isProcessing) {
                statusText.innerText = 'Processing Command...';
                statusText.classList.remove('text-primary');
                statusText.classList.add('text-secondary');
                micCore.classList.replace('bg-primary', 'bg-secondary');
                currentText.style.opacity = '0.5';
            } else {
                statusText.innerText = 'Listening...';
                statusText.classList.replace('text-secondary', 'text-primary');
                micCore.classList.replace('bg-secondary', 'bg-primary');
                currentText.style.opacity = '1';
            }
        });

        // Interactive Suggestion Chips
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                if(this.innerText.includes('Sektor')) {
                    const text = this.innerText.trim();
                    currentText.innerText = `"${text}"`;
                }
            });
        });
    </script>
